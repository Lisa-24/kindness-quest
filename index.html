<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindness Quest</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cormorant+Garamond:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Onboarding -->
    <div id="onboarding">
        <div id="onboarding-step-1" class="onboarding-card">
            <div class="icon-box">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="#F87171" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </div>
            <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Kindness Quest</h1>
            <p style="color: var(--stone-500); font-family: var(--font-serif); font-style: italic; font-size: 1.125rem; margin-bottom: 2.5rem;">
                The world is better when we're kind. Ready to start your journey?
            </p>
            <button class="btn-primary" onclick="nextStep()">
                Let's Go 
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>

        <div id="onboarding-step-2" class="onboarding-card hidden">
            <h2 style="font-size: 1.5rem; margin-bottom: 2rem;">Create Your Hero</h2>
            
            <p style="font-size: 0.625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--stone-400); margin-bottom: 1rem;">Choose an Avatar</p>
            <div id="avatar-grid" class="avatar-grid no-scrollbar"></div>

            <p style="font-size: 0.625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--stone-400); margin-bottom: 0.5rem; text-align: left;">Hero Name</p>
            <input type="text" id="name-input" placeholder="Enter your name...">

            <button id="start-btn" class="btn-primary" disabled>Start My Quest</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="container">
        <header>
            <div class="profile-bar">
                <div class="user-info">
                    <div class="avatar-main">
                        <img id="user-avatar" src="" alt="Avatar" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;">
                        <div id="user-level" class="level-badge">LVL 1</div>
                    </div>
                    <div>
                        <h1 id="user-name" style="font-size: 1.5rem;">Hero</h1>
                        <p style="font-size: 0.75rem; color: var(--stone-500); font-style: italic;">Kindness Explorer</p>
                    </div>
                </div>
                <div class="points-display">
                    <div class="points-value">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                        <span id="user-points">0</span>
                    </div>
                    <p style="font-size: 0.625rem; text-transform: uppercase; color: var(--stone-400); font-weight: 700;">Kindness Points</p>
                </div>
            </div>

            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="progress-labels">
                <span>Progress</span>
                <span id="progress-text">0% to Level 2</span>
            </div>
        </header>

        <!-- Badges -->
        <section style="margin-bottom: 2.5rem;">
            <div class="section-header">
                <h2 style="font-size: 1.125rem; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold-color)" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
                    Your Badges
                </h2>
            </div>
            <div id="badge-list" class="badge-list no-scrollbar"></div>
        </section>

        <!-- Missions -->
        <section>
            <div class="section-header">
                <h2 style="font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--red-400)" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    Daily Missions
                </h2>
            </div>
            <div id="mission-list"></div>
        </section>
    </div>

    <!-- Mission Modal -->
    <div id="mission-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <div style="margin-bottom: 1.5rem;">
                <h2 id="modal-title" style="font-size: 1.5rem; margin-bottom: 0.5rem;">Mission</h2>
                <p id="modal-desc" style="color: var(--stone-500); font-size: 0.875rem;">Description goes here.</p>
            </div>
            
            <div style="margin-bottom: 2rem;">
                <p style="font-size: 0.625rem; font-weight: 700; text-transform: uppercase; color: var(--stone-400); margin-bottom: 0.5rem;">Reflection (Optional)</p>
                <textarea style="width: 100%; padding: 1rem; background: var(--stone-100); border: 1px solid var(--stone-200); border-radius: 1rem; height: 100px; resize: none; outline: none;" placeholder="How did it feel?"></textarea>
            </div>

            <button id="complete-btn" class="btn-primary" onclick="completeMission()">
                Mark as Completed
                <span id="modal-points" style="opacity: 0.6; font-size: 0.875rem;">+50 pts</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
